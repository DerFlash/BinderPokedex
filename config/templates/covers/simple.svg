<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="210mm" height="297mm" 
     viewBox="0 0 210 297"
     version="1.1">
  
  <!-- Cover Template: Simple Design (A4) - Matches current CoverRenderer layout -->
  
  <!-- White background -->
  <rect x="0" y="0" width="210" height="297" fill="#FFFFFF" />
  
  <!-- Top colored stripe (100mm high) with color variable -->
  <rect x="0" y="0" width="210" height="100" fill="{{stripe_color}}" />
  
  <!-- Semi-transparent overlay on stripe -->
  <rect x="0" y="0" width="210" height="100" fill="#000000" opacity="0.05" />
  
  <!-- Stripe title: "Binder Pokédex" -->
  <text x="105" y="70" 
        font-family="Helvetica-Bold" 
        font-size="42" 
        fill="#FFFFFF" 
        text-anchor="middle">Binder Pokédex</text>
  
  <!-- Decorative underline for stripe title -->
  <line x1="40" y1="62" x2="170" y2="62" 
        stroke="#FFFFFF" 
        stroke-width="1.5" />
  
  <!-- Section title (multilingual) - rendered by Python -->
  <!-- Position: x=105mm (center), y=242mm from bottom = 55mm from top -->
  
  <!-- Section subtitle (multilingual) - rendered by Python -->
  <!-- Position: x=105mm (center), y=232mm from bottom = 65mm from top -->
  
  <!-- Pokémon count text - rendered by Python -->
  <!-- Position: x=105mm (center), y=147mm from bottom = 150mm from top -->
  
  <!-- Decorative line -->
  <line x1="40" y1="152" x2="170" y2="152" 
        stroke="{{stripe_color}}" 
        stroke-width="1.0" />
  
  <!-- Description text - rendered by Python with logo support -->
  <!-- Position: x=105mm (center), y=139mm from bottom = 158mm from top (8mm below line) -->
  
  <!-- Featured elements area (lower section) -->
  <!-- Featured Pokémon images rendered by Python at y=35mm from bottom -->
  <!-- Card size: 45mm × 63mm, spaced 8-10mm apart, centered horizontally -->
  
  <!-- Footer - rendered by Python -->
  <!-- Position: y=2.5mm from bottom -->
  
</svg>
