<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="210mm" height="297mm" 
     viewBox="0 0 210 297"
     version="1.1">
  
  <!-- Cover Template: Simple Design (A4) - Matches current CoverRenderer layout -->
  
  <!-- Top colored stripe (100mm high) with color variable -->
  <rect x="0" y="0" width="210" height="100" fill="{{stripe_color}}" />
  
  <!-- Stripe title "Binder Pokédex" (static, always English) -->
  <text x="105" y="35" 
        font-family="Helvetica-Bold" 
        font-size="15" 
        fill="#FFFFFF" 
        text-anchor="middle">Binder Pokédex</text>
  
  <!-- Decorative underline -->
  <line x1="40" y1="37" x2="170" y2="37" 
        stroke="#FFFFFF" 
        stroke-width="0.5" />
  
  <!-- Dynamic content (will be replaced by Python via XML manipulation) -->
  <text id="section_title" x="105" y="55" 
        font-family="Helvetica-Bold" 
        font-size="14" 
        fill="#333333" 
        text-anchor="middle">[Section Title]</text>
  
  <text id="section_subtitle" x="105" y="65" 
        font-family="Helvetica" 
        font-size="18" 
        fill="#666666" 
        text-anchor="middle">[Section Subtitle]</text>
  
  <text id="pokemon_count" x="105" y="147" 
        font-family="Helvetica" 
        font-size="14" 
        fill="#666666" 
        text-anchor="middle">[Pokemon Count]</text>
  
  <!-- Decorative line -->
  <line id="decorative_line" x1="40" y1="152" x2="170" y2="152" 
        stroke="{{stripe_color}}" 
        stroke-width="1.0" />
  
  <text id="description" x="105" y="160"
        font-family="Helvetica" 
        font-size="11" 
        fill="#666666" 
        text-anchor="middle">[Description]</text>
  
  <!-- Featured Pokemon area (images will be injected by Python) -->
  <g id="featured_area">
    <!-- Placeholder for featured Pokemon images (centered with 10mm spacing) -->
    <rect x="27.5" y="199" width="45" height="63" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="0.5"/>
    <rect x="82.5" y="199" width="45" height="63" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="0.5"/>
    <rect x="137.5" y="199" width="45" height="63" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="0.5"/>
  </g>
  
  <!-- Footer -->
  <text id="footer" x="105" y="294.5" 
        font-family="Helvetica" 
        font-size="6" 
        fill="#CCCCCC" 
        text-anchor="middle">[Footer Text]</text>
  
</svg>
