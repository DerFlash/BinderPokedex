name: Announce Release

on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Create Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to announce, for example v8.2
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  announce:
    name: Update README release pointers
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      RELEASE_MANIFEST: ${{ runner.temp }}/release-manifest.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          INPUT_TAG: ${{ inputs.tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag_name="$RELEASE_TAG"
            release_url="$RELEASE_URL"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag_name="$INPUT_TAG"
            release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$tag_name"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            git fetch --tags --force
            tag_name="$(git tag --points-at "$WORKFLOW_RUN_SHA" | sort -V | tail -n 1)"
            if [ -z "$tag_name" ]; then
              echo "Could not resolve release tag for workflow_run SHA $WORKFLOW_RUN_SHA"
              exit 1
            fi
            release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$tag_name"
          else
            echo "Unsupported event: $EVENT_NAME"
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag_name"
          echo "Release URL: $release_url"

      - name: Download release manifest
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release download "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern release-manifest.json \
            --clobber \
            --dir "$(dirname "$RELEASE_MANIFEST")"
          test -s "$RELEASE_MANIFEST"

      - name: Update READMEs from manifest
        run: |
          python scripts/release/announce_release.py \
            --manifest "$RELEASE_MANIFEST" \
            --release-url "${{ steps.release.outputs.release_url }}"

      - name: Automated README review
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
        run: |
          git diff --name-only

          grep -q "$TAG_NAME" README.md
          grep -q "$TAG_NAME" README.de.md
          grep -q "$RELEASE_URL" README.md
          grep -q "$RELEASE_URL" README.de.md

          python - <<'PY'
          import json
          import re
          from pathlib import Path

          changed_files = set(
              line.strip()
              for line in __import__("subprocess").check_output(
                  ["git", "diff", "--name-only"], text=True
              ).splitlines()
              if line.strip()
          )
          expected_files = {"README.md", "README.de.md"}
          if changed_files != expected_files:
              raise SystemExit(f"Unexpected changed files: {sorted(changed_files)}")

          manifest = json.loads(Path(__import__("os").environ["RELEASE_MANIFEST"]).read_text(encoding="utf-8"))
          tag = manifest["tag"]
          pdf_count = str(manifest["pdfs"]["total"])
          scope_count = str(manifest["scope_count"])

          checks = [
              ("README.md", rf"Latest \({re.escape(tag)}\).*All {pdf_count} PDFs"),
              ("README.md", rf"Scope-Based System\*\* with {scope_count} total scopes"),
              ("README.de.md", rf"Aktuelle Version \({re.escape(tag)}\).*Alle {pdf_count} PDFs"),
              ("README.de.md", rf"Scope-basiertes System\*\* mit {scope_count} Scopes insgesamt"),
          ]
          for filename, pattern in checks:
              text = Path(filename).read_text(encoding="utf-8")
              if not re.search(pattern, text, re.S):
                  raise SystemExit(f"README review failed: {filename} does not match {pattern}")
          PY

      - name: Create README update PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          branch: automation/announce-${{ steps.release.outputs.tag_name }}
          delete-branch: true
          commit-message: "docs: announce ${{ steps.release.outputs.tag_name }}"
          title: "docs: announce ${{ steps.release.outputs.tag_name }}"
          body: |
            Automated README announcement for `${{ steps.release.outputs.tag_name }}`.

            This PR was generated from `release-manifest.json` attached to the published release.
            The workflow already verified that only `README.md` and `README.de.md` changed and that both files reference the published release URL.
          labels: |
            automated
            documentation

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --auto \
            --delete-branch
