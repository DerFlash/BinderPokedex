name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag info
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release: $TAG_NAME"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Noto Sans CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          fc-cache -fv

      - name: Generate PDFs
        run: |
          # Fetch all data first
          echo "Fetching data for all scopes..."
          scopes="Pokedex"
          for scope_file in config/scopes/*.yaml; do
            scope=$(basename "$scope_file" .yaml)
            if [ "$scope" != "Pokedex" ]; then
              scopes="$scopes $scope"
            fi
          done

          for scope in $scopes; do
            echo "  → Fetching $scope"
            python scripts/fetcher/fetch.py --scope $scope
          done
          
          # Generate all PDFs (all scopes, all languages)
          echo "Generating all PDFs..."
          python scripts/pdf/generate_pdf.py --scope all
          
          # Verify output
          if [ ! -d output ]; then
            echo "Error: output directory not created"
            exit 1
          fi
          
          PDF_COUNT=$(find output -type f -name '*.pdf' | wc -l)
          echo "Generated $PDF_COUNT PDFs"
          
          if [ "$PDF_COUNT" -eq 0 ]; then
            echo "Error: No PDFs were generated"
            exit 1
          fi
      
      - name: Create language-specific PDF zips
        run: |
          cd output
          
          # Create individual zips per language (each containing all scopes)
          for lang in de en fr es it ja ko zh_hans zh_hant; do
            if [ -d "$lang" ]; then
              echo "Creating ZIP for $lang..."
              zip -r ../binder-pokedex-${lang}.zip $lang -x ".*"
            else
              echo "WARNING: directory '$lang' not found, skipping"
            fi
          done
          
          cd ..
          ls -lh binder-pokedex*.zip

      - name: Build release manifest
        run: |
          python scripts/release/build_manifest.py \
            --tag "${{ steps.tag.outputs.tag_name }}" \
            --output release-manifest.json
          cat release-manifest.json
      
      - name: Create Release with Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Binder Pokédex ${{ steps.tag.outputs.tag_name }}
          files: |
            binder-pokedex-de.zip
            binder-pokedex-en.zip
            binder-pokedex-fr.zip
            binder-pokedex-es.zip
            binder-pokedex-it.zip
            binder-pokedex-ja.zip
            binder-pokedex-ko.zip
            binder-pokedex-zh_hans.zip
            binder-pokedex-zh_hant.zip
            release-manifest.json
          body: |
            ## Binder Pokédex ${{ steps.tag.outputs.tag_name }}
            
            **What's New in ${{ steps.tag.outputs.tag_name }}:**
            
            🎴 **Classic Set Expansion:**
            - Added **Jungle** (base2) with 64 cards
            - Added **Fossil** (base3) with 62 cards
            - Fixed missing artwork for classic Trainer cards without a TCGdex subtype
            
            ---
            
            ### 📥 Downloads (by Language)
            Each ZIP contains all available PDFs for that language:
            
            - 🇩🇪 **binder-pokedex-de.zip** - Deutsch
            - 🇬🇧 **binder-pokedex-en.zip** - English
            - 🇫🇷 **binder-pokedex-fr.zip** - Français
            - 🇪🇸 **binder-pokedex-es.zip** - Español
            - 🇮🇹 **binder-pokedex-it.zip** - Italiano
            - 🇯🇵 **binder-pokedex-ja.zip** - 日本語
            - 🇰🇷 **binder-pokedex-ko.zip** - 한국어
            - 🇨🇳 **binder-pokedex-zh_hans.zip** - 简体中文
            - 🇹🇼 **binder-pokedex-zh_hant.zip** - 繁體中文
            
            ### 📋 Content Overview
            **29 Total Scopes:**
            - **Pokédex:** Complete National Pokédex (1,025 Pokémon across 9 generations)
            - **ExGen1-3:** TCG EX collections (94/324/366 cards)
            - **ME01-MEP:** Pokémon TCG Mega Evolution era (6 sets)
            - **SV01-SV10 + SVP:** Scarlet & Violet era (17 sets)
            - **Base1-Base3:** Base Set, Jungle, and Fossil
            
            ### 📊 Stats
            - **Total Scopes:** 29 (1 Pokédex + 3 ExGen + 25 TCG sets)
            - **Languages:** 9 (DE, EN, FR, ES, IT, JA, KO, ZH-Hans, ZH-Hant)
            - **Cards/Pokémon:** 1,025+ Pokémon + 4,000+ TCG cards
            - **Featured Elements:** 75+ iconic Pokémon showcased across all covers
            
            ### 🔧 Technical Details
            - Featured elements with automatic format detection
            - Cross-platform font support (macOS Songti + Linux Noto Sans CJK)
            - Scope-based modular architecture
            - PokeAPI fallback for universal coverage
            - Proper CJK character rendering
            
            📚 **[Full Changelog & Documentation](https://github.com/DerFlash/BinderPokedex)**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
